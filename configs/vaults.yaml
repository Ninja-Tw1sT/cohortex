# Knowledge vaults (ChromaDB collections) that agents bind to by name.
# A vault is created on first use. Point collection/db_path at an existing
# ChromaDB to reuse it — e.g. ai-workflow's `obsidian_vault`.
vaults:
  demo_kb:
    collection: demo_kb
